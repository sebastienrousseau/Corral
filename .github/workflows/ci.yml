name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck bats
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install shellcheck bats-core
          fi
        shell: bash

      - name: Verify Bash 4+
        run: |
          echo "Bash version: $BASH_VERSION"
          if ((BASH_VERSINFO[0] < 4)); then
            echo "::error::Bash 4+ required"
            exit 1
          fi
        shell: bash

      - name: Lint and syntax check
        run: make check
        shell: bash

      - name: Run tests
        run: make test
        shell: bash
